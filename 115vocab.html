    const q = document.getElementById('s').value.toLowerCase(), g = document.getElementById('grid'), l = document.getElementById('list');
    g.innerHTML = ''; l.innerHTML = '';
    data.forEach((w, i) => {
        const s = states[w.e] || 'none';
        if((filter === 'all' || s === filter) && (w.e.includes(q) || w.c.includes(q))) {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `<div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                <div class="card-front"><div class="front-main"><div class="word-eng">${w.e}</div><div class="word-kk">${w.k}</div><div class="word-pos">${w.p}</div></div>
                <div class="front-footer"><div style="font-size:22px; cursor:pointer" onclick="event.stopPropagation(); speak('${w.e}')">🔊</div>
                <div class="filter-buttons" style="margin-top:8px"><button class="btn-status ${s==='p'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','p')">完美</button><button class="btn-status ${s==='n'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','n')">普通</button><button class="btn-status ${s==='u'?'selected':''}" onclick="event.stopPropagation(); setS('${w.e}','u')">不熟</button></div></div></div>
                <div class="card-back"><div class="front-main"><b style="font-size:22px; color:#000;">${w.c}</b><hr style="width:100%; border:1.5px solid var(--rose); margin:12px 0;"><div style="color:var(--deep); font-weight:bold; font-size:14px; text-align:center;">用法：<br>${w.d}</div></div></div></div>`;
            g.appendChild(div);
            const qdiv = document.createElement('div'); qdiv.className = 'quiz-item';
            qdiv.innerHTML = `<div class="quiz-header"><b>${w.c}</b> <span style="color:#666; font-size:13px">${w.k} ${w.p}</span> <span style="cursor:pointer" onclick="speak('${w.e}')">🔊</span> <span class="hidden-hint">${getH(w.e)}</span>
                <div style="margin-left:auto" class="filter-buttons"><button class="btn-status ${s==='p'?'selected':''}" onclick="setS('${w.e}','p')">完美</button><button class="btn-status ${s==='n'?'selected':''}" onclick="setS('${w.e}','n')">普通</button><button class="btn-status ${s==='u'?'selected':''}" onclick="setS('${w.e}','u')">不熟</button></div></div>
                <div class="quiz-input-area"><input type="text" class="spell-input" id="i${i}" placeholder="挑戰正確拼寫..."><div style="display:flex; align-items:center; margin-top:5px;"><button class="ans-btn" id="b${i}" onclick="ans(${i},'${w.e.replace(/'/g, "\\'")}')">查看解答</button><span class="ans-text" id="a${i}">${w.e}</span></div></div>`;
            l.appendChild(qdiv);
        }
    });
}
render();
</script>
</body>
</html>
